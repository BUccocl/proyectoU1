<ion-header>
  <ion-toolbar>
    <ion-title>
      Figuras Geométricas
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label>Seleccione figura</ion-label>

    <ion-select [(ngModel)]="figuraSeleccionada">

      <ion-select-option value="circulo">
        Círculo
      </ion-select-option>

      <ion-select-option value="triangulo">
        Triángulo
      </ion-select-option>

    </ion-select>

  </ion-item>

  <!-- Mostrar componentes -->

  <app-circulo *ngIf="figuraSeleccionada === 'circulo'"></app-circulo>

  <app-triangulo *ngIf="figuraSeleccionada === 'triangulo'"></app-triangulo>

</ion-content>
